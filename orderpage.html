<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Order page · track with dates & day names</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* === RESET & CORE (reused from cart design) === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f4f6fa;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
    }

    .order-container {
      max-width: 880px;
      width: 100%;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
      padding: 28px 24px;
      transition: padding 0.2s;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1e293b;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .header h2 i { color: #3b82f6; }

    .profile-badge {
      background: #f1f5f9;
      border-radius: 40px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      border: 1px solid #cbd5e1;
    }

    /* filter chips */
    .filter-section {
      margin-bottom: 28px;
    }
    .filter-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-chips {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }
    .filter-chips::-webkit-scrollbar {
      height: 5px;
    }
    .filter-chips::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .chip {
      flex: 0 0 auto;
      background: #f8fafc;
      border: 1px solid #d1d9e6;
      border-radius: 40px;
      padding: 8px 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip i {
      color: #3b82f6;
      font-size: 0.9rem;
    }
    .chip.active {
      background: #1e293b;
      color: white;
      border-color: #1e293b;
    }
    .chip.active i {
      color: #facc15;
    }

    /* order cards */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 24px;
    }
    .order-card {
      border: 1px solid #e9eef2;
      border-radius: 24px;
      padding: 20px;
      background: #fff;
      transition: 0.1s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .order-row1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-no {
      font-weight: 700;
      font-size: 1.1rem;
      color: #0f172a;
      letter-spacing: -0.2px;
    }
    .status-badge {
      background: #e9f2ff;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1e4f8a;
      border: 1px solid #bdd3f0;
    }
    .status-badge i { font-size: 0.75rem; }

    .order-row2 {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: #475569;
    }
    .order-date span, .est-arrival span {
      font-weight: 600;
      color: #1e293b;
      margin-left: 4px;
    }

    .order-items {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      background: #f8fafc;
      padding: 12px 16px;
      border-radius: 20px;
    }
    .item-imgs {
      display: flex;
      align-items: center;
    }
    .item-thumb {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #eef2f6;
      object-fit: cover;
      border: 2px solid white;
      margin-right: -8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .item-summary-text {
      font-size: 0.9rem;
      color: #334155;
      font-weight: 500;
    }
    .item-summary-text strong {
      color: #0f172a;
    }

    .order-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .action-btn {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 40px;
      padding: 10px 24px;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.15s;
      color: #1e293b;
    }
    .action-btn i { font-size: 0.9rem; }
    .action-btn.track {
      background: #e6f0ff;
      border-color: #3b82f6;
      color: #1e4f8a;
    }
    .action-btn.help {
      background: #f0f2f5;
    }
    .action-btn:hover {
      background: #e2e8f0;
    }
    .action-btn.track:hover {
      background: #dbeafe;
    }

    /* bottom sheet – timeline styling */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      opacity: 0;
      visibility: hidden;
      transition: .25s;
      z-index: 998;
    }
    .overlay.active { opacity: 1; visibility: visible; }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      transform: translateY(100%);
      transition: .3s cubic-bezier(0.2,0.9,0.3,1);
      padding: 24px 20px;
      z-index: 999;
      max-height: 85vh;
      overflow: auto;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
    }
    .bottom-sheet.active { transform: translateY(0); }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .close-sheet {
      border: none;
      background: #f1f5f9;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .timeline-item {
      display: flex;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid #edf2f7;
    }
    .timeline-item:last-child {
      border-bottom: none;
    }
    .timeline-icon {
      width: 36px;
      height: 36px;
      background: #f1f5f9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3b82f6;
      flex-shrink: 0;
    }
    .timeline-content {
      flex: 1;
    }
    .timeline-status {
      font-weight: 600;
      color: #0f172a;
    }
    .timeline-date {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
      display: flex;
      gap: 10px;
    }
    .current-indicator {
      background: #dcfce7;
      color: #166534;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
      margin-left: 8px;
    }

    .empty-orders {
      text-align: center;
      padding: 40px 20px;
      background: #f9f9fc;
      border-radius: 32px;
      color: #64748b;
      border: 1px dashed #cbd5e1;
    }
    .empty-orders i {
      font-size: 3rem;
      color: #a0afbe;
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .order-container { padding: 18px 14px; }
      .order-row2 { gap: 12px; }
      .action-btn { padding: 8px 16px; }
    }
    @media (max-width: 400px) {
      .chip { padding: 6px 12px; font-size: 0.75rem; }
    }
    button { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>

<div class="order-container">
  <div class="header">
    <h2><i class="fas fa-box-open"></i> My orders</h2>
    <div class="profile-badge">
      <i class="fas fa-user-circle"></i> <span>Ramesh</span>
    </div>
  </div>

  <!-- FILTER SECTION -->
  <div class="filter-section">
    <div class="filter-title">
      <i class="fas fa-sliders-h"></i> Shipment status
    </div>
    <div class="filter-chips" id="filterChips"></div>
  </div>

  <!-- ORDERS LIST -->
  <div id="ordersList" class="orders-list"></div>

  <!-- bottom sheet for tracking -->
  <div class="overlay" id="overlay"></div>
  <div class="bottom-sheet" id="trackSheet">
    <div class="sheet-header">
      <h3><i class="fas fa-truck"></i> Tracking timeline</h3>
      <button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button>
    </div>
    <div id="trackSheetContent" class="track-sheet-content">
      <!-- dynamic timeline will be injected here -->
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- ALL POSSIBLE SHIPMENT STATUSES (with icons & order for timeline) -----
    const statusList = [
      { id: 'all', label: 'All', icon: 'fa-list' },
      { id: 'orderCreated', label: 'Order Created', icon: 'fa-clipboard-list' },
      { id: 'quotationReceived', label: 'Quotation Received', icon: 'fa-file-invoice' },
      { id: 'orderApproved', label: 'Order Approved', icon: 'fa-check-circle' },
      { id: 'orderCancelled', label: 'Order Cancelled', icon: 'fa-ban' },
      { id: 'incomingShipment', label: 'Incoming Shipment', icon: 'fa-truck' },
      { id: 'arrivedIndiaWarehouse', label: 'Arrived at India Warehouse', icon: 'fa-warehouse' },
      { id: 'arrivedNepalWarehouse', label: 'Arrived at Nepal Warehouse', icon: 'fa-warehouse' },
      { id: 'customClearance', label: 'Custom Clearance', icon: 'fa-passport' },
      { id: 'shipped', label: 'Shipped', icon: 'fa-shipping-fast' },
      { id: 'delivered', label: 'Delivered', icon: 'fa-box-open' },
      { id: 'wrongProduct', label: 'Wrong Product Received', icon: 'fa-exclamation-triangle' },
      { id: 'returnToSeller', label: 'Return to Seller', icon: 'fa-undo-alt' },
      { id: 'deliveryDelayed', label: 'Delivery Delayed', icon: 'fa-clock' },
      { id: 'deliveryFailed', label: 'Delivery Failed', icon: 'fa-times-circle' },
      { id: 'undeliveredReturning', label: 'Undelivered Returning', icon: 'fa-rotate-left' },
      { id: 'customHold', label: 'Custom Hold', icon: 'fa-pause-circle' },
      { id: 'returnRequested', label: 'Return Requested', icon: 'fa-question-circle' },
      { id: 'returnReceived', label: 'Return Received', icon: 'fa-check-double' }
    ];

    // ----- TYPICAL PROGRESSION (for building timeline) -----
    const mainFlow = [
      'orderCreated',
      'quotationReceived',
      'orderApproved',
      'incomingShipment',
      'arrivedIndiaWarehouse',
      'arrivedNepalWarehouse',
      'customClearance',
      'shipped',
      'delivered'
    ];

    // ----- MOCK ORDER DATA (with realistic dates) -----
    const ordersData = [
      { id: 1, orderNo: 'ORD-1001', date: '2025-03-28', estArrival: '2025-04-05', statusId: 'orderCreated', items: [{ name: 'Running Shoes', qty: 1, img: 'https://picsum.photos/id/100/40' }, { name: 'T-Shirt', qty: 2, img: 'https://picsum.photos/id/1015/40' }] },
      { id: 2, orderNo: 'ORD-1002', date: '2025-03-25', estArrival: '2025-04-02', statusId: 'shipped', items: [{ name: 'Slim Jeans', qty: 1, img: 'https://picsum.photos/id/1043/40' }, { name: 'Earbuds', qty: 1, img: 'https://picsum.photos/id/106/40' }] },
      { id: 3, orderNo: 'ORD-1003', date: '2025-03-20', estArrival: '2025-03-30', statusId: 'delivered', items: [{ name: 'Leather Wallet', qty: 1, img: 'https://picsum.photos/id/1/40' }] },
      { id: 4, orderNo: 'ORD-1004', date: '2025-03-22', estArrival: '2025-04-07', statusId: 'customClearance', items: [{ name: 'Smartwatch', qty: 1, img: 'https://picsum.photos/id/20/40' }, { name: 'Sunglasses', qty: 1, img: 'https://picsum.photos/id/26/40' }] },
      { id: 5, orderNo: 'ORD-1005', date: '2025-03-18', estArrival: '2025-03-28', statusId: 'deliveryDelayed', items: [{ name: 'Yoga Mat', qty: 1, img: 'https://picsum.photos/id/30/40' }] },
      { id: 6, orderNo: 'ORD-1006', date: '2025-03-15', estArrival: '2025-03-25', statusId: 'returnRequested', items: [{ name: 'Bluetooth Speaker', qty: 1, img: 'https://picsum.photos/id/36/40' }] },
      { id: 7, orderNo: 'ORD-1007', date: '2025-03-10', estArrival: '2025-03-19', statusId: 'orderApproved', items: [{ name: 'Backpack', qty: 1, img: 'https://picsum.photos/id/40/40' }] }
    ];

    let activeFilter = 'all';

    // helper to get full status object by id
    function getStatusById(id) {
      return statusList.find(s => s.id === id) || { label: id, icon: 'fa-question' };
    }

    // ----- generate timeline for an order (returns array of steps with date & day) -----
    function generateTimeline(order) {
      const currentStatusId = order.statusId;
      const baseDate = new Date(order.date); // order date
      const today = new Date();

      // 1. Determine sequence of status IDs leading to current status
      let sequence = [];

      if (mainFlow.includes(currentStatusId)) {
        // take all steps from start up to current
        const idx = mainFlow.indexOf(currentStatusId);
        sequence = mainFlow.slice(0, idx + 1);
      } else {
        // For statuses not in main flow (cancelled, return, etc.)
        // We'll create a simple two-step: orderCreated -> current status
        // but if orderCreated is already there, we keep it.
        sequence = ['orderCreated', currentStatusId];
        // Remove duplicates if same
        if (currentStatusId === 'orderCreated') sequence = ['orderCreated'];
      }

      // 2. Assign dates: spread evenly between order date and today (or est arrival for future)
      // For simplicity, we increment by 1 day for each step after the first.
      let timeline = [];
      let currentDate = new Date(baseDate);
      for (let i = 0; i < sequence.length; i++) {
        const statusId = sequence[i];
        const status = getStatusById(statusId);
        // create date object for this step
        let stepDate = new Date(currentDate);
        // add i days (so first step = order date, second = order date +1, etc.)
        stepDate.setDate(baseDate.getDate() + i);

        // But ensure we don't exceed today for past statuses? we'll just keep logical.
        // For delivered, it might be in past.
        // Add day name
        const dayName = stepDate.toLocaleDateString('en-US', { weekday: 'long' });
        const formattedDate = stepDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

        timeline.push({
          statusId,
          label: status.label,
          icon: status.icon,
          date: stepDate,
          dayName,
          formattedDate,
          isCurrent: (statusId === currentStatusId)
        });
      }

      // Optionally, if the order has a return/ cancellation, we could add more steps, but this is sufficient.
      return timeline;
    }

    // ----- render filter chips -----
    function renderFilters() {
      const container = document.getElementById('filterChips');
      if (!container) return;
      container.innerHTML = '';
      statusList.forEach(s => {
        const chip = document.createElement('div');
        chip.className = `chip ${activeFilter === s.id ? 'active' : ''}`;
        chip.setAttribute('data-status', s.id);
        chip.innerHTML = `<i class="fas ${s.icon}"></i><span>${s.label}</span>`;
        chip.addEventListener('click', () => {
          activeFilter = s.id;
          renderFilters();
          renderOrders();
        });
        container.appendChild(chip);
      });
    }

    // ----- render orders based on filter -----
    function renderOrders() {
      const listEl = document.getElementById('ordersList');
      if (!listEl) return;
      const filtered = activeFilter === 'all' 
        ? ordersData 
        : ordersData.filter(o => o.statusId === activeFilter);

      if (filtered.length === 0) {
        listEl.innerHTML = `<div class="empty-orders"><i class="fas fa-box-open"></i><br />No orders with this status</div>`;
        return;
      }

      let htmlStr = '';
      filtered.forEach(order => {
        const status = getStatusById(order.statusId);
        let thumbsHtml = '';
        let itemNames = [];
        order.items.forEach((item, idx) => {
          if (idx < 3) {
            thumbsHtml += `<img src="${item.img}" class="item-thumb" alt="${item.name}" loading="lazy">`;
          }
          itemNames.push(`${item.qty}× ${item.name}`);
        });
        const itemsSummary = itemNames.join(', ');

        htmlStr += `
          <div class="order-card" data-order-id="${order.id}">
            <div class="order-row1">
              <span class="order-no"><i class="fas fa-hashtag" style="opacity:0.6;"></i> ${order.orderNo}</span>
              <span class="status-badge"><i class="fas ${status.icon}"></i> ${status.label}</span>
            </div>
            <div class="order-row2">
              <div class="order-date"><i class="far fa-calendar-alt"></i> Order date: <span>${order.date}</span></div>
              <div class="est-arrival"><i class="far fa-clock"></i> Est. arrival: <span>${order.estArrival}</span></div>
            </div>
            <div class="order-items">
              <div class="item-imgs">${thumbsHtml}</div>
              <div class="item-summary-text"><strong>${order.items.length} item(s)</strong> · ${itemsSummary.substring(0,40)}${itemsSummary.length>40?'...':''}</div>
            </div>
            <div class="order-actions">
              <button class="action-btn track" data-order='${JSON.stringify(order)}'><i class="fas fa-map-marker-alt"></i> Track</button>
              <button class="action-btn help" data-orderid="${order.id}"><i class="fas fa-life-ring"></i> Help</button>
            </div>
          </div>
        `;
      });
      listEl.innerHTML = htmlStr;

      // attach track event
      document.querySelectorAll('.action-btn.track').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const orderData = JSON.parse(btn.dataset.order);
          openTrackSheet(orderData);
        });
      });
      // help button
      document.querySelectorAll('.action-btn.help').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const orderId = btn.dataset.orderid;
          alert(`Help & support for order #${orderId}\nYou can contact seller or raise a ticket.`);
        });
      });
    }

    // ----- open bottom sheet with timeline -----
    function openTrackSheet(order) {
      const sheet = document.getElementById('trackSheet');
      const overlay = document.getElementById('overlay');
      const contentDiv = document.getElementById('trackSheetContent');

      const timeline = generateTimeline(order);

      let timelineHtml = '';
      timeline.forEach(step => {
        const currentClass = step.isCurrent ? 'current-indicator' : '';
        const currentBadge = step.isCurrent ? '<span class="current-indicator">current</span>' : '';
        timelineHtml += `
          <div class="timeline-item">
            <div class="timeline-icon"><i class="fas ${step.icon}"></i></div>
            <div class="timeline-content">
              <div class="timeline-status">${step.label} ${currentBadge}</div>
              <div class="timeline-date">
                <span>${step.formattedDate}</span>
                <span>${step.dayName}</span>
              </div>
            </div>
          </div>
        `;
      });

      // also show order summary
      const status = getStatusById(order.statusId);
      contentDiv.innerHTML = `
        <div style="background:#f8fafc; border-radius:20px; padding:16px; margin-bottom:20px;">
          <div style="display:flex; gap:10px; align-items:center; margin-bottom:8px;">
            <i class="fas ${status.icon}" style="font-size:1.4rem;"></i>
            <span><strong>${order.orderNo}</strong> · ${status.label}</span>
          </div>
          <div style="font-size:0.9rem; color:#334155;">Items: ${order.items.map(i=>`${i.qty}× ${i.name}`).join(', ')}</div>
          <div style="font-size:0.85rem; margin-top:8px;">📅 Est. arrival: ${order.estArrival}</div>
        </div>
        <h4 style="margin: 0 0 10px;"><i class="fas fa-history"></i> Shipment updates</h4>
        ${timelineHtml}
      `;

      overlay.classList.add('active');
      sheet.classList.add('active');
    }

    // close sheet
    function closeSheet() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('trackSheet').classList.remove('active');
    }

    // initial render
    renderFilters();
    renderOrders();

    // event listeners for sheet close
    document.getElementById('overlay').addEventListener('click', closeSheet);
    document.getElementById('closeSheet').addEventListener('click', closeSheet);
  })();
</script>
</body>
</html>
