    // Helper functions
    function showToast(message = "📋 Copied to clipboard!") {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                if (toast.textContent !== "📋 Copied to clipboard!") {
                    toast.textContent = "📋 Copied to clipboard!";
                }
            }, 300);
        }, 1800);
    }

    // Robust copy with fallback
    function copyToClipboard(text, event) {
        event?.stopPropagation();
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("✅ Copied!");
            }).catch(() => {
                fallbackCopyText(text);
            });
        } else {
            fallbackCopyText(text);
        }
    }

    function fallbackCopyText(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.top = '-1000px';
        textarea.style.left = '-1000px';
        document.body.appendChild(textarea);
        textarea.select();
        textarea.setSelectionRange(0, text.length);
        let success = false;
        try {
            success = document.execCommand('copy');
        } catch (err) {
            success = false;
        }
        document.body.removeChild(textarea);
        if (success) {
            showToast("📋 Copied!");
        } else {
            alert("Unable to copy automatically. Please select the text and press Ctrl+C / Cmd+C.");
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatAnswerWithLinks(text) {
        let escaped = escapeHtml(text);
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        escaped = escaped.replace(urlRegex, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
        escaped = escaped.replace(/\n/g, '<br>');
        return escaped;
    }

    // Render quick containers with filtering and auto-expand
    function renderQuickGrid(filteredItems, expandAll = false) {
        const grid = document.getElementById('quickGrid');
        grid.innerHTML = '';
        if (filteredItems.length === 0) return;
        
        filteredItems.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card quick-card';
            
            const header = document.createElement('div');
            header.className = 'card-header';
            const titleSpan = document.createElement('h3');
            titleSpan.innerHTML = `<i class="fas fa-reply-all" style="font-size:0.9rem; margin-right:8px; color:#3b82f6;"></i> ${escapeHtml(item.title)}`;
            const toggleIcon = document.createElement('i');
            toggleIcon.className = 'fas fa-chevron-down toggle-icon';
            header.appendChild(titleSpan);
            header.appendChild(toggleIcon);
            
            const answerDiv = document.createElement('div');
            answerDiv.className = 'answer-area';
            const answerTextDiv = document.createElement('div');
            answerTextDiv.className = 'answer-text';
            answerTextDiv.innerHTML = formatAnswerWithLinks(item.answer);
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = '<i class="far fa-copy"></i> Copy answer';
            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                copyToClipboard(item.answer, e);
            });
            
            answerDiv.appendChild(answerTextDiv);
            answerDiv.appendChild(copyBtn);
            card.appendChild(header);
            card.appendChild(answerDiv);
            
            // Auto-expand if needed
            let isOpen = expandAll;
            if (isOpen) {
                answerDiv.classList.add('show');
                toggleIcon.classList.remove('fa-chevron-down');
                toggleIcon.classList.add('fa-chevron-up');
            }
            
            // Toggle on header click
            header.addEventListener('click', () => {
                const currentlyOpen = answerDiv.classList.contains('show');
                if (currentlyOpen) {
                    answerDiv.classList.remove('show');
                    toggleIcon.classList.remove('fa-chevron-up');
                    toggleIcon.classList.add('fa-chevron-down');
                } else {
                    answerDiv.classList.add('show');
                    toggleIcon.classList.remove('fa-chevron-down');
                    toggleIcon.classList.add('fa-chevron-up');
                }
                isOpen = !currentlyOpen;
            });
            grid.appendChild(card);
        });
    }

    // Render FAQ list
    function renderFaqList(containerId, faqArray, expandAll = false) {

            const answerTextDiv = document.createElement('div');
            answerTextDiv.className = 'answer-text';

            const copyFaqBtn = document.createElement('button');

            copyFaqBtn.innerHTML = '<i class="far fa-copy"></i> Copy answer';
            copyFaqBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                copyToClipboard(faq.answer, e);
            });
            answerWrapper.appendChild(answerTextDiv);
            answerWrapper.appendChild(copyFaqBtn);
            
            faqCard.appendChild(questionDiv);
            faqCard.appendChild(answerWrapper);
            
            let isOpen = expandAll;
            if (isOpen) {
                answerWrapper.classList.add('show');
                faqToggleIcon.classList.remove('fa-chevron-down');
                faqToggleIcon.classList.add('fa-chevron-up');
            }
            
            questionDiv.addEventListener('click', () => {
                if (!isOpen) {
                    answerWrapper.classList.add('show');
                    faqToggleIcon.classList.remove('fa-chevron-down');
                    faqToggleIcon.classList.add('fa-chevron-up');
                } else {
                    answerWrapper.classList.remove('show');
                    faqToggleIcon.classList.remove('fa-chevron-up');
                    faqToggleIcon.classList.add('fa-chevron-down');
                }
                isOpen = !isOpen;
            });
            container.appendChild(faqCard);
        });
    }

    // Main search handler: filters all sections
    function handleSearch(keyword) {
        const lowerKw = keyword.trim().toLowerCase();
        const isSearchActive = lowerKw !== '';
        
        // Filter quick replies
        let filteredQuick = quickQuestions;
        if (isSearchActive) {
            filteredQuick = quickQuestions.filter(item => 
                item.title.toLowerCase().includes(lowerKw) || 
                item.answer.toLowerCase().includes(lowerKw)
            );
        }
        
        // Filter FAQs
        let generalMatches = [];
        let onCallMatches = [];
        if (isSearchActive) {
            generalMatches = allFaqs.filter(f => 
                f.category === 'general' && 
                (f.question.toLowerCase().includes(lowerKw) || f.answer.toLowerCase().includes(lowerKw))
            );
            onCallMatches = allFaqs.filter(f => 
                f.category === 'oncall' && 
                (f.question.toLowerCase().includes(lowerKw) || f.answer.toLowerCase().includes(lowerKw))
            );
        } else {
            generalMatches = allFaqs.filter(f => f.category === 'general');
            onCallMatches = allFaqs.filter(f => f.category === 'oncall');
        }
        
        // Render sections with expandAll = true when search active
        renderQuickGrid(filteredQuick, isSearchActive);
        renderFaqList('generalFaqContainer', generalMatches, isSearchActive);
        renderFaqList('onCallFaqContainer', onCallMatches, isSearchActive);
        
        // Show/hide FAQ section containers based on content
        const generalSection = document.getElementById('generalFaqSection');
        const onCallSection = document.getElementById('onCallFaqSection');
        const globalNoResult = document.getElementById('globalNoResult');
        
        const hasGeneral = generalMatches.length > 0;
        const hasOnCall = onCallMatches.length > 0;
        const hasQuick = filteredQuick.length > 0;
        
        if (!hasGeneral) generalSection.classList.add('hide-section');
        else generalSection.classList.remove('hide-section');
        
        if (!hasOnCall) onCallSection.classList.add('hide-section');
        else onCallSection.classList.remove('hide-section');
        
        // Show global no-result if no content at all and search is active
        if (isSearchActive && !hasQuick && !hasGeneral && !hasOnCall) {
            globalNoResult.style.display = 'block';
        } else {
            globalNoResult.style.display = 'none';
        }
    }

    // Initialize search input listener
    function initSearch() {
        const searchInput = document.getElementById('searchFAQ');
        searchInput.addEventListener('input', (e) => {
            handleSearch(e.target.value);
        });
    }

    // Initial render (show all, collapsed)
    window.addEventListener('DOMContentLoaded', () => {
        handleSearch(''); // shows all quick and FAQs, collapsed
        initSearch();
    });
</script>
</body>
</html>
