<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Thumbnail Generator with Domain Filter</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@microlink/mql@latest/dist/mql.min.js"></script>

<style>
@keyframes ellipsis {
  0% { content: '.'; }
  33% { content: '..'; }
  66% { content: '...'; }
}

.loading-ellipsis::after {
  content: '.';
  animation: ellipsis 1s infinite;
  display: inline-block;
  width: 1em;
}

.product-name-loading::placeholder {
  color: #9CA3AF;
}
</style>
</head>

<body class="bg-gradient-to-r from-blue-100 to-purple-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-6">

<h4 class="text-sm font-bold text-gray-800 mb-4">
Product Name & Image Auto Fetch
</h4>

<div class="flex items-center space-x-4 mb-4">

<div id="thumbnailContainer"
class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden relative flex-shrink-0 border-2 border-gray-200 transition-all duration-300">

<div id="loadingSpinner"
class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-80 z-10 hidden">

<svg class="animate-spin h-8 w-8 text-blue-500"
xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24">
<circle class="opacity-25" cx="12" cy="12" r="10"
stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" fill="currentColor"
d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
</svg>

</div>

<p id="placeholderText"
class="text-gray-400 text-xs text-center p-1">
Enter URL
</p>

</div>

<div class="flex-1">
<input type="text"
id="urlInput"
placeholder="Paste your URL here"
class="w-full px-4 py-3 text-base border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

</div>

<div id="domainMessage" class="text-red-500 text-sm mb-4 hidden">
<div class="flex items-center">
<span class="text-xs">We do not operate for this website.</span>
<a href="#" id="helpLink"
class="ml-2 text-xs text-green-700 border border-green-700 px-2 py-1 rounded-full"
target="_blank">Need Help?</a>
</div>
</div>

<div class="mb-1 relative">
<input type="text"
id="productName"
maxlength="30"
placeholder="Product Name"
class="w-full px-4 py-3 text-base border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

<div id="productNameLoading"
class="absolute inset-y-0 right-0 flex items-center pr-4 hidden">
<span class="loading-ellipsis text-gray-500">Loading</span>
</div>
</div>

<p id="productNameHint"
class="text-green-600 text-xs mb-4 hidden">
Please edit the product name if it's incorrect.
</p>

<p id="characterCount"
class="text-gray-500 text-xs">
0 / 30
</p>

</div>

<script>
const urlInput = document.getElementById('urlInput');
const thumbnailContainer = document.getElementById('thumbnailContainer');
const loadingSpinner = document.getElementById('loadingSpinner');
const placeholderText = document.getElementById('placeholderText');
const productNameInput = document.getElementById('productName');
const productNameHint = document.getElementById('productNameHint');
const characterCount = document.getElementById('characterCount');
const domainMessage = document.getElementById('domainMessage');
const helpLink = document.getElementById('helpLink');

let lastProcessedUrl = "";
let finalImageLoaded = false;

/* --- KEEP YOUR WHITELIST --- */
const allowedDomains = [ 'amazon.in','flipkart.com','myntra.com','ajio.com','nykaa.com','zara.com','hm.com','meesho.com','croma.com','lenskart.com','snapdeal.com','tatacliq.com','jiomart.com','oneplus.in','puma.com','uniqlo.com','chanel.com' ];

/* --- EVENTS --- */
urlInput.addEventListener('input', handleUrlInput);
urlInput.addEventListener('paste', () => setTimeout(handleUrlInput, 0));
productNameInput.addEventListener('input', updateCharacterCount);

/* --- HELPERS --- */

function extractDomain(url) {
  try {
    const hostname = new URL(url).hostname;
    return hostname.replace(/^www\./, '');
  } catch {
    return null;
  }
}

function showErrorMessage(message, url) {
  domainMessage.querySelector('span').textContent = message;
  const text = `Hi, I need help regarding this 3rd party website not listed: ${url}`;
  helpLink.href = `https://wa.me/9779845925880?text=${encodeURIComponent(text)}`;
  domainMessage.classList.remove('hidden');
}

function hideErrorMessage() {
  domainMessage.classList.add('hidden');
}

function showLoading() {
  loadingSpinner.classList.remove('hidden');
  placeholderText.classList.add('hidden');
}

function hideLoading() {
  loadingSpinner.classList.add('hidden');
  placeholderText.classList.remove('hidden');
}

function resetThumbnail() {
  thumbnailContainer.innerHTML =
  '<p class="text-gray-400 text-xs text-center p-1">Enter URL</p>';
  thumbnailContainer.classList.remove('border-blue-500');
  thumbnailContainer.classList.add('border-gray-200');
  productNameInput.value = '';
  productNameHint.classList.add('hidden');
  updateCharacterCount();
}

async function handleUrlInput() {

  const url = urlInput.value.trim();

  if (!url) {
    lastProcessedUrl = "";
    resetThumbnail();
    hideErrorMessage();
    productNameInput.disabled = false;
    return;
  }

  if (url === lastProcessedUrl) return;
  lastProcessedUrl = url;

  const domain = extractDomain(url);

  if (!domain) {
    showErrorMessage("Invalid URL.", url);
    productNameInput.disabled = true;
    return;
  }

  if (!allowedDomains.some(d => domain.includes(d))) {
    resetThumbnail();
    showErrorMessage("We do not operate for this website.", url);
    productNameInput.disabled = true;
    return;
  }

  hideErrorMessage();
  productNameInput.disabled = false;
  showLoading();
  finalImageLoaded = false;

  try {
    // Start fetching thumbnail and favicon simultaneously
    const thumbnailPromise = mql(url).then(res => {
      if(res.status==='success'){
        return res.data.image?.url || res.data.logo?.url || null;
      }
      return null;
    });

    const thumbnailUrl = await Promise.race([
      thumbnailPromise,
      new Promise((_, reject) => setTimeout(() => reject('timeout'),5000))
    ]).catch(() => null);

    if(thumbnailUrl) {
      await loadImage(thumbnailUrl);
    }

    // Set product name if available
    const data = await mql(url);
    if(data.status==='success' && data.data.title){
      productNameInput.value = data.data.title.substring(0,30);
      productNameHint.classList.remove('hidden');
      updateCharacterCount();
    }

    // Try favicon only if thumbnail not loaded
    if(!finalImageLoaded) {
      await tryFavicon(domain);
    }

  } catch {
    if(!finalImageLoaded){
      await tryFavicon(domain);
    }
  }
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      hideLoading();
      finalImageLoaded = true;
      thumbnailContainer.innerHTML =
      `<img src="${url}" class="w-full h-full object-cover rounded-lg">`;
      thumbnailContainer.classList.remove('border-gray-200');
      thumbnailContainer.classList.add('border-blue-500');
      resolve();
    };
    img.onerror = reject;
    img.src = url;
  });
}

/* --- GOOGLE FAVICON FALLBACK --- */

async function tryFavicon(domain) {

  const googleFavicon = `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;

  try {
    if(!finalImageLoaded) await loadImage(googleFavicon);
  } catch {
    try {
      if(!finalImageLoaded) await loadImage(`https://${domain}/favicon.ico`);
    } catch {
      if(!finalImageLoaded) displayDomainName(domain);
    }
  }
}

function displayDomainName(domain) {
  hideLoading();
  thumbnailContainer.innerHTML =
  `<div class="w-full h-full flex items-center justify-center bg-gray-200 rounded-lg">
  <span class="text-xs font-bold text-gray-700 break-all text-center px-1">
  ${domain}
  </span>
  </div>`;
  thumbnailContainer.classList.remove('border-gray-200');
  thumbnailContainer.classList.add('border-blue-500');
}

function updateCharacterCount() {
  characterCount.textContent =
  `${productNameInput.value.length} / 30`;
}

</script>
</body>
</html>
