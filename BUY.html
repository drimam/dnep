<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lottie Buttons · Quick Order Modal</title>
  <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
      background-color: #f5f5f5;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .lottie-button {
      display: inline-flex;
      align-items: center;
      padding: 12px 20px;
      border-radius: 50px;
      border: 1px solid #ccc;
      background: linear-gradient(45deg, #ff69b4, #8a2be2);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s;
      color: white;
      box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
      white-space: nowrap;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .lottie-button:hover {
      background: linear-gradient(45deg, #ff85c0, #9370db);
      transform: translateY(-2px);
      box-shadow: 3px 3px 12px rgba(0, 0, 0, 0.25);
    }

    .shining-button {
      background: linear-gradient(45deg, #ff3366, #6633ff);
      position: relative;
      overflow: hidden;
      animation: pulse 2s infinite;
    }

    .shining-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 100%; }
      100% { left: 100%; }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(138, 43, 226, 0); }
      100% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0); }
    }

    .lottie-animation {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 12px;
      overflow: hidden;
      background-color: #fffdd0;
      position: relative;
      z-index: 1;
    }

    .lottie-button span {
      font-weight: bold;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .shining-button:hover {
      background: linear-gradient(45deg, #ff5588, #7755ff);
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 420px;          /* slightly wider for inputs */
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      animation: slideUp 0.3s ease;
    }

    .modal-header {
      background: linear-gradient(45deg, #ff3366, #6633ff);
      color: white;
      padding: 16px 20px;
      text-align: center;
      position: relative;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .ai-badge {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      color: white;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-left: 6px;
    }

    .close-modal {
      position: absolute;
      top: 12px;
      right: 16px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .close-modal:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(1.1);
    }

    .modal-body {
      padding: 24px 22px 18px;
    }

    /* form field styles */
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #333;
      margin-bottom: 6px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      transition: border 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
      background: #fafafa;
      font-family: inherit;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #6633ff;
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 51, 255, 0.15);
      background: white;
    }

    .input-group input::placeholder,
    .input-group textarea::placeholder {
      color: #999;
      font-size: 0.9rem;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: center;
    }

    .proceed-btn {
      padding: 14px 24px;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s;
      min-width: 180px;
      background: linear-gradient(45deg, #ff3366, #6633ff);
      color: white;
      border: none;
      box-shadow: 0 6px 14px rgba(102, 51, 255, 0.3);
    }

    .proceed-btn:hover {
      background: linear-gradient(45deg, #ff4d7a, #7f5cff);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(102, 51, 255, 0.4);
    }

    .proceed-btn:active {
      transform: translateY(0);
      box-shadow: 0 5px 10px rgba(102, 51, 255, 0.3);
    }

    /* animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="button-container">
    <!-- Buy For Me button -->
    <a href="https://merowish.com/order" class="lottie-button">
      <div class="lottie-animation">
        <dotlottie-player
          src="https://lottie.host/a9f276c9-7a41-4d37-9adf-ed488b1dac21/QgVPaX7z7W.json"
          background="transparent"
          speed="1"
          style="width: 100%; height: 100%"
          loop
          autoplay
        ></dotlottie-player>
      </div>
      <span>Buy For Me</span>
    </a>

    <!-- Quick Order button (triggers new modal) -->
    <a href="#" class="lottie-button shining-button" id="quickOrderBtn">
      <div class="lottie-animation">
        <dotlottie-player
          src="https://lottie.host/845a9f06-f737-4b77-887c-5db6245215ad/tH3Z1uOIM3.json"
          background="transparent"
          speed="1"
          style="width: 100%; height: 100%"
          loop
          autoplay
        ></dotlottie-player>
      </div>
      <span>Quick Order</span>
    </a>

    <!-- Self Order button (WhatsApp) -->
    <a href="https://wa.me/9779845925880" class="lottie-button">
      <div class="lottie-animation">
        <dotlottie-player
          src="https://lottie.host/bcb2bc2b-a437-4cd8-b66d-de1119cd1ab3/q8LJuJbECV.json"
          background="transparent"
          speed="1"
          style="width: 100%; height: 100%"
          loop
          autoplay
        ></dotlottie-player>
      </div>
      <span>Self Order</span>
    </a>
  </div>

  <!-- MODAL: Quick order with two input fields + Add to Cart -->
  <div class="modal-overlay" id="quickOrderModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>
          ⚡ Quick Order
          <span class="ai-badge">AI assisted</span>
        </h2>
        <button class="close-modal" id="closeModal">&times;</button>
      </div>
      
      <div class="modal-body">
        <!-- product link field -->
        <div class="input-group">
          <label for="productLink">🔗 Product Link</label>
          <input type="url" id="productLink" placeholder="Paste URL / Link here" autocomplete="off">
        </div>

        <!-- comment field (size/color/variant) -->
        <div class="input-group">
          <label for="comment">📝 Comment</label>
          <textarea id="comment" placeholder="Mention: Required Size, Color, Variant / Model" rows="3"></textarea>
        </div>

        <!-- footer with Add to Cart button -->
        <div class="modal-footer">
          <button class="proceed-btn" id="addToCartBtn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // DOM elements
      const quickOrderBtn = document.getElementById('quickOrderBtn');
      const modal = document.getElementById('quickOrderModal');
      const closeBtn = document.getElementById('closeModal');
      const addToCartBtn = document.getElementById('addToCartBtn');

      // Input fields
      const productLinkInput = document.getElementById('productLink');
      const commentInput = document.getElementById('comment');

      // --- open modal ---
      quickOrderBtn.addEventListener('click', function(e) {
        e.preventDefault();
        modal.classList.add('active');
        // optional: focus first field
        setTimeout(() => productLinkInput.focus(), 100);
      });

      // --- close functions ---
      function closeModal() {
        modal.classList.remove('active');
        // clear fields when closing (optional, but good UX)
        // productLinkInput.value = '';
        // commentInput.value = '';
      }

      closeBtn.addEventListener('click', closeModal);

      // click outside modal content
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          closeModal();
        }
      });

      // ESC key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
          closeModal();
        }
      });

      // --- Add to Cart logic ---
      addToCartBtn.addEventListener('click', function() {
        const link = productLinkInput.value.trim();
        const comment = commentInput.value.trim();

        // simple validation
        if (link === '') {
          alert('Please paste a product link 📎');
          productLinkInput.focus();
          return;
        }

        // optional: very basic URL check (doesn't have to be perfect)
        if (!link.startsWith('http://') && !link.startsWith('https://')) {
          alert('Please enter a valid URL (starting with http:// or https://)');
          productLinkInput.focus();
          return;
        }

        // simulate adding to cart – you can replace this with real functionality
        const message = `✅ Product added to cart!\n\nLink: ${link}\nComment: ${comment || '(no comment)'}`;
        alert(message);

        // (optional) you could also send data to a server or WhatsApp later.
        // For now we just close the modal.
        closeModal();

        // optionally clear fields after successful add
        productLinkInput.value = '';
        commentInput.value = '';
      });

    })();
  </script>
</body>
</html>
